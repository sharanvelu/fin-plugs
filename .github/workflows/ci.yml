name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      # Plugs run under fincli; the tests import it. The tool is public, so a
      # plain checkout works — no token needed.
      - name: Check out fincli
        uses: actions/checkout@v4
        with:
          repository: sharanvelu/fin
          path: fin-cli

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: fin-cli/pyproject.toml

      - name: Install fincli
        run: python -m pip install ./fin-cli

      - name: Run tests
        run: python -m pytest

  contract:
    # The repo-specific invariants (fincli/stdlib-only imports, the declarative
    # rule, loader discovery) as their own status check. These also run inside
    # the `test` job's suite; this job just makes a violation legible at a
    # glance on the PR.
    name: plug contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out fincli
        uses: actions/checkout@v4
        with:
          repository: sharanvelu/fin
          path: fin-cli

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fin-cli/pyproject.toml

      - name: Install fincli
        run: python -m pip install ./fin-cli

      - name: Check plug contracts
        run: python -m pytest tests/test_plug_contracts.py -v

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: check App Asset Global tests
